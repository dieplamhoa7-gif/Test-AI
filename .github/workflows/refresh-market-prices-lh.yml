name: Refresh LH market prices

on:
  schedule:
    # Every 1 minute during Vietnam market hours, Mon-Fri: 09:00-15:45 ICT = 02:00-08:45 UTC.
    # GitHub Actions schedule may still be delayed/throttled, but output cache target is 1-minute refresh.
    - cron: '* 2-8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-market-prices:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-news-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh price output cache only
        run: python refresh_market_prices_lh.py

      - name: Commit updated price cache
        run: |
          git config user.name "LH Investment Bot"
          git config user.email "actions@users.noreply.github.com"
          git add firebase_public/data/market_data.json firebase_public/data/market_watch.json
          git add -f data/market_data.json
          git diff --cached --quiet || git commit -m "Auto refresh LH market prices"
          git push

      - name: Deploy LHInvestment hosting
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: |
          python - <<'PY'
          import base64, os, pathlib
          raw = os.environ.get('FIREBASE_SERVICE_ACCOUNT_B64', '').strip()
          if not raw:
              raise SystemExit('Missing FIREBASE_SERVICE_ACCOUNT_B64 secret')
          path = pathlib.Path('firebase-service-account.json')
          path.write_bytes(base64.b64decode(raw))
          PY
          npm install -g firebase-tools
          GOOGLE_APPLICATION_CREDENTIALS=firebase-service-account.json firebase deploy --only hosting --project lhinvestment
