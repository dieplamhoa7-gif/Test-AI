name: Refresh LH news cache

on:
  schedule:
    # Vietnam market/news hours: every 10 minutes from 08:00 to 22:59 ICT.
    - cron: '*/10 1-15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-news-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh Vietnamese news output
        run: python refresh_news_cache_lh.py

      - name: Build English news output
        run: python build_news_translate_cache.py --limit 120

      - name: Build Firebase static output
        run: python build_firebase_cache_site.py

      - name: Notify users about new watchlist news
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python notify_news_alerts.py

      - name: Commit updated cache
        run: |
          git config user.name "LH Investment Bot"
          git config user.email "actions@users.noreply.github.com"
          git add firebase_public/data/news_cache.json firebase_public/data/news_cache_en.json
          git add -f data/news_cache.json data/news_cache_en.json data/translation_memory_vi_en.json
          git diff --cached --quiet || git commit -m "Auto refresh LH news cache"
          git push

      - name: Deploy LHInvestment hosting
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: |
          python - <<'PY'
          import base64, os, pathlib
          raw = os.environ.get('FIREBASE_SERVICE_ACCOUNT_B64', '').strip()
          if not raw:
              raise SystemExit('Missing FIREBASE_SERVICE_ACCOUNT_B64 secret')
          path = pathlib.Path('firebase-service-account.json')
          path.write_bytes(base64.b64decode(raw))
          print('Wrote Firebase service account file')
          PY
          npm install -g firebase-tools
          GOOGLE_APPLICATION_CREDENTIALS=firebase-service-account.json firebase deploy --only hosting --project lhinvestment
