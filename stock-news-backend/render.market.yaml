services:
  - type: web
    name: hoainvest97-market
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.market.txt
    startCommand: python -m uvicorn app.market_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: REQUEST_TIMEOUT
        value: 15
