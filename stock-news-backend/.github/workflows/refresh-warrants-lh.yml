name: Refresh LH warrants cache

on:
  schedule:
    # Vietnam market hours: refresh as often as GitHub scheduled workflows allow.
    # GitHub cron minimum is 5 minutes; frontend still refreshes watched/visible CW faster.
    - cron: '*/5 2-8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-lh-warrants-cache
  cancel-in-progress: true

jobs:
  refresh-warrants:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-news-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh warrants realtime cache
        run: python refresh_warrants_cache_lh.py

      - name: Commit updated warrants cache
        run: |
          git config user.name "LH Investment Bot"
          git config user.email "actions@users.noreply.github.com"
          git add firebase_public/data/warrants_data.json firebase_public/data/app_version.json
          git diff --cached --quiet || git commit -m "Auto refresh LH warrants cache"
          git push

      - name: Deploy LHInvestment hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project lhinvestment --token "$FIREBASE_TOKEN"
