name: Refresh LH EOD top200 market cap

on:
  schedule:
    # After 15:15 Vietnam close window, weekdays: 15:25 ICT = 08:25 UTC.
    - cron: '25 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-lh-eod-top200-marketcap
  cancel-in-progress: true

jobs:
  refresh-eod-top200:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-news-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh EOD top 200 market cap indicators
        run: python refresh_eod_all_stocks_lh.py

      - name: Refresh public Firebase cache
        run: python build_firebase_cache_site.py

      - name: Refresh warrants cache after static rebuild
        run: python refresh_warrants_cache_lh.py

      - name: Commit updated EOD cache
        run: |
          git config user.name "LH Investment Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/eod_top200_marketcap_hose_hnx.json firebase_public/data/eod_top200_marketcap_hose_hnx.json
          git add data/eod_all_stocks_hose_hnx.json firebase_public/data/eod_all_stocks_hose_hnx.json
          git add firebase_public/data/warrants_data.json firebase_public/data/app_version.json
          git diff --cached --quiet || git commit -m "Auto refresh LH EOD stocks cache"
          git push

      - name: Deploy LHInvestment hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project lhinvestment --token "$FIREBASE_TOKEN"
