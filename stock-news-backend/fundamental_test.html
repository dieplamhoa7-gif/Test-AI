<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LH Fundamental Test</title><style>
:root{--bg:#07111f;--panel:#101b2e;--line:#233552;--text:#eaf2ff;--muted:#91a4c4;--blue:#4da3ff;--green:#34d399;--red:#fb7185;--yellow:#fbbf24}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:radial-gradient(circle at top,#123056,#07111f 56%);color:var(--text);min-height:100vh}.wrap{max-width:1180px;margin:0 auto;padding:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.brand{font-weight:900;letter-spacing:.12em}.nav a{color:var(--text);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:9px 12px;margin-left:6px}.card{background:rgba(16,27,46,.9);border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 18px 50px rgba(0,0,0,.22)}h1,h2,h3{margin:0 0 10px}.muted{color:var(--muted);font-size:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}input,button{font:inherit}input{width:100%;background:#07111f;border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--text);margin:6px 0 10px}button{border:0;border-radius:12px;padding:11px 14px;font-weight:800;cursor:pointer;background:var(--blue);color:white}.metric{border:1px solid var(--line);border-radius:16px;background:#0b1526;padding:14px}.metric span{display:block;color:var(--muted);font-size:13px}.metric b{font-size:24px}.good{color:var(--green)}.warn{color:var(--yellow)}.bad{color:var(--red)}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:top}th{color:#bcd3f7}.pill{display:inline-flex;border-radius:999px;padding:5px 8px;background:#10213a;color:#bcd3f7;font-weight:800;font-size:12px}.report{border:1px solid var(--line);background:#0b1526;border-radius:16px;padding:12px;margin:8px 0}.report a{color:#8ecbff;text-decoration:none;font-weight:800}.small{font-size:12px}@media(max-width:720px){.top{flex-direction:column;align-items:flex-start}.nav a{display:inline-flex;margin:3px 3px 3px 0}.wrap{padding:10px}table{font-size:13px}}
</style></head><body><div class="wrap"><div class="top"><div><div class="brand">LH INVESTMENT</div><div class="muted">Fundamental Test - đọc output báo cáo/định giá cache</div></div><div class="nav"><a href="/stocks">Stocks</a><a href="/portfolio-test">Portfolio Test</a><a href="/admin-test">Admin Test</a></div></div>
<div class="card"><h1>Fundamental Analyst Test</h1><p class="muted">Trang test riêng, không ảnh hưởng popup public. Chỉ đọc cache: fundamental_top_upside, fundamental_signals, 24hmoney_reports, market_data.</p><div class="grid"><div><label>Mã cổ phiếu</label><input id="symbolInput" placeholder="VD: FPT, HPG, DGC"></div><div style="align-self:end"><button id="analyzeBtn">Phân tích</button></div></div><div id="status" class="muted"></div></div>
<div id="result"></div></div><script>
const $=id=>document.getElementById(id);let market={},top=[],signals=[],reports=[];function n(v,d=2){const x=Number(v||0);return x?x.toLocaleString('vi-VN',{maximumFractionDigits:d}):'-'}function money(v){const x=Number(v||0);if(!x)return'-';return x.toLocaleString('vi-VN',{maximumFractionDigits:0})}function pct(v){const x=Number(v||0);return Number.isFinite(x)?x.toFixed(1)+'%':'-'}function cls(v){return Number(v)>=20?'good':Number(v)>=5?'warn':'bad'}function clean(s){return String(s||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,12)}function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
async function j(url){const r=await fetch(url+'?ts='+Date.now(),{cache:'no-store'});return r.json()}async function load(){ $('status').textContent='Đang tải cache...'; const [m,t,s,r]=await Promise.all([j('/data/market_data.json'),j('/data/fundamental_top_upside.json'),j('/data/fundamental_signals.json'),fetch('/data/24hmoney_reports.json?ts='+Date.now(),{cache:'no-store'}).then(x=>x.ok?x.json():{items:[]}).catch(()=>({items:[]}))]); const mi=Array.isArray(m.items)?m.items:[];market=Object.fromEntries(mi.map(x=>[String(x.ticker||x.symbol||'').toUpperCase(),x]));top=Array.isArray(t.items)?t.items:[];signals=Array.isArray(s.items)?s.items:[];reports=Array.isArray(r.items)?r.items:[];$('status').textContent=`Đã tải: ${mi.length} mã, ${signals.length} tín hiệu báo cáo, ${reports.length} báo cáo 24HMoney`;}
function latestBySymbol(sym){const ss=signals.filter(x=>String(x.symbol||'').toUpperCase()===sym).sort((a,b)=>String(b.report_date||'').localeCompare(String(a.report_date||'')));const rs=reports.filter(x=>(x.symbols||[x.symbol]).map(y=>String(y).toUpperCase()).includes(sym)).sort((a,b)=>String(b.report_date||'').localeCompare(String(a.report_date||'')));return{signals:ss,reports:rs}}
function analyze(sym){sym=clean(sym);if(!sym)return;const item=market[sym]||{};const price=Number(item.price||0);const topItem=top.find(x=>String(x.symbol||'').toUpperCase()===sym)||{};const {signals:ss,reports:rs}=latestBySymbol(sym);const targets=ss.map(x=>Number(x.target_price||0)).filter(Boolean);const avgTarget=Number(topItem.avgTargetPrice||0)|| (targets.length?targets.reduce((a,b)=>a+b,0)/targets.length:0);const upside=price&&avgTarget?(avgTarget-price)/price*100:Number(topItem.upsidePct||0);const brokers=[...new Set(ss.map(x=>x.broker).filter(Boolean))];const latest=ss[0]||{};const confidence=ss.length?ss.reduce((a,b)=>a+Number(b.confidence||0),0)/ss.length:0;let verdict='Thiếu dữ liệu báo cáo',vcls='bad';if(avgTarget&&upside>=20){verdict='Upside hấp dẫn theo báo cáo';vcls='good'}else if(avgTarget&&upside>=5){verdict='Upside vừa phải/cần chọn điểm mua';vcls='warn'}else if(avgTarget){verdict='Upside thấp hoặc đã phản ánh vào giá';vcls='bad'}
const reportRows=ss.slice(0,8).map(x=>`<tr><td>${esc(x.report_date||'-')}</td><td>${esc(x.broker||x.source||'-')}</td><td>${money(x.target_price)}</td><td>${esc(x.title||'')}</td><td>${x.url?`<a style="color:#8ecbff" target="_blank" href="${esc(x.url)}">Open</a>`:'-'}</td></tr>`).join('')||'<tr><td colspan="5" class="muted">Không có tín hiệu báo cáo trong cache.</td></tr>';
const reportCards=rs.slice(0,5).map(x=>`<div class="report"><a target="_blank" href="${esc((x.url||x.url_file||'').replaceAll('\\\\/','/'))}">${esc(x.title||'-')}</a><div class="muted small">${esc(x.source||x.provider||'-')} • ${esc(x.report_date||'-')}</div><p>${esc(x.summary||'')}</p></div>`).join('')||'<p class="muted">Không có báo cáo 24HMoney trong cache.</p>';
$('result').innerHTML=`<div class="card"><h2>${sym} - Fundamental Summary</h2><div class="grid"><div class="metric"><span>Giá hiện tại</span><b>${n(price)}</b></div><div class="metric"><span>Giá mục tiêu TB</span><b>${money(avgTarget)}</b></div><div class="metric"><span>Upside theo báo cáo</span><b class="${cls(upside)}">${pct(upside)}</b></div><div class="metric"><span>Số báo cáo/tín hiệu</span><b>${ss.length}</b></div><div class="metric"><span>Số CTCK/source</span><b>${brokers.length||'-'}</b></div><div class="metric"><span>Confidence TB</span><b>${confidence?confidence.toFixed(2):'-'}</b></div></div><h3 class="${vcls}">${verdict}</h3><p class="muted">Latest: ${esc(latest.report_date||'-')} • ${esc(latest.title||'Không có')}</p></div><div class="card"><h3>Bảng báo cáo CTCK gần nhất</h3><table><thead><tr><th>Ngày</th><th>Broker</th><th>Target</th><th>Tiêu đề</th><th>Link</th></tr></thead><tbody>${reportRows}</tbody></table></div><div class="card"><h3>Báo cáo 24HMoney / summary cache</h3>${reportCards}</div>`}
$('analyzeBtn').onclick=()=>analyze($('symbolInput').value);$('symbolInput').addEventListener('keydown',e=>{if(e.key==='Enter')analyze($('symbolInput').value)});load().then(()=>{const q=new URLSearchParams(location.search).get('symbol')||'DGC';$('symbolInput').value=q;analyze(q)});
</script></body></html>
