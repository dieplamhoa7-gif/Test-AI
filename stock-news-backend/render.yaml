services:
  - type: web
    name: hoainvest97-news
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: REQUEST_TIMEOUT
        value: 15
      - key: MAX_ARTICLES_PER_SOURCE
        value: 8
      - key: SUMMARY_MAX_WORDS
        value: 50
      - key: OPENAI_MODEL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
